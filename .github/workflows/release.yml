name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture existing tags
        run: git tag --list > "$RUNNER_TEMP/tags-before.txt"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect pending changesets
        id: changesets
        run: |
          if find .changeset -maxdepth 1 -name '*.md' -print -quit | grep -q .; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Version packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm version-packages

      - name: Commit version updates
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No version changes to commit."
            exit 0
          fi
          git commit -m "chore(release): publish packages [skip ci]"

      - name: Rebase release commit onto latest main
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          git fetch origin main
          git rebase origin/main

      - name: Run release checks
        run: pnpm release:check

      - name: Publish packages
        run: pnpm release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Detect new release tags
        id: release_tags
        run: |
          git tag --list > "$RUNNER_TEMP/tags-after.txt"
          new_tags="$(grep -Fxv -f "$RUNNER_TEMP/tags-before.txt" "$RUNNER_TEMP/tags-after.txt" || true)"

          if [ -n "$new_tags" ]; then
            echo "has_new_tags=true" >> "$GITHUB_OUTPUT"
            {
              echo "tags<<EOF"
              printf '%s\n' "$new_tags"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_new_tags=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push release commit
        if: steps.changesets.outputs.has_changesets == 'true'
        run: git push origin HEAD:main

      - name: Push tags
        run: git push origin --tags

      - name: Create GitHub releases
        if: steps.release_tags.outputs.has_new_tags == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          while IFS= read -r tag; do
            if [ -z "$tag" ]; then
              continue
            fi

            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "GitHub release already exists for $tag"
              continue
            fi

            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --generate-notes \
              --title "$tag"
          done <<'EOF'
          ${{ steps.release_tags.outputs.tags }}
          EOF
