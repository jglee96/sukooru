name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with coverage
        run: pnpm test -- --coverage

      - name: Build packages and verify publish artifacts
        run: pnpm build

      - name: End-to-end tests
        run: pnpm test:e2e

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            packages/core/coverage/lcov.info,
            packages/react/coverage/lcov.info,
            packages/vue/coverage/lcov.info,
            packages/next/coverage/lcov.info,
            packages/nuxt/coverage/lcov.info,
            packages/svelte/coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
